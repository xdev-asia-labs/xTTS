services:
  xtts:
    build: .
    container_name: xtts
    restart: unless-stopped
    ports:
      - "${PORT:-3099}:${PORT:-3099}"
    env_file:
      - path: .env
        required: false
    environment:
      - PORT=${PORT:-3099}
      - TTS_MAX_CHUNK=${TTS_MAX_CHUNK:-500}
      - TTS_MAX_RETRIES=${TTS_MAX_RETRIES:-3}
      - TTS_MAX_TEXT_LENGTH=${TTS_MAX_TEXT_LENGTH:-20000}
      - TTS_CACHE_SIZE=${TTS_CACHE_SIZE:-100}
      - TTS_CORS_ORIGINS=${TTS_CORS_ORIGINS:-*}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-3099}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xTTS — Text to Speech</title>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --border: #334155;
    --text: #e2e8f0; --muted: #94a3b8; --accent: #38bdf8;
    --accent-hover: #0ea5e9; --success: #22c55e; --error: #ef4444;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; justify-content: center;
    padding: 2rem 1rem;
  }
  .container { width: 100%; max-width: 720px; }
  h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.25rem; }
  h1 span { color: var(--accent); }
  .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem;
  }
  label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.4rem; font-weight: 500; }
  textarea {
    width: 100%; min-height: 120px; padding: 0.75rem;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-size: 0.95rem;
    resize: vertical; outline: none; transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent); }
  .char-count { text-align: right; font-size: 0.8rem; color: var(--muted); margin-top: 0.25rem; }
  .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: 1rem; }
  .controls.three { grid-template-columns: 1fr 1fr 1fr; }
  select, input[type="range"] { width: 100%; }
  select {
    padding: 0.6rem; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-size: 0.9rem; outline: none;
    cursor: pointer;
  }
  select:focus { border-color: var(--accent); }
  .range-group { display: flex; flex-direction: column; }
  .range-label { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--muted); }
  input[type="range"] {
    -webkit-appearance: none; height: 6px; background: var(--border);
    border-radius: 3px; outline: none; margin-top: 0.5rem;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px;
    background: var(--accent); border-radius: 50%; cursor: pointer;
  }
  .btn-row { display: flex; gap: 0.75rem; margin-top: 1.25rem; }
  button {
    flex: 1; padding: 0.75rem 1rem; border: none; border-radius: var(--radius);
    font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  }
  .btn-primary { background: var(--accent); color: #0f172a; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-secondary:hover { background: #475569; }
  .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }

  .result { display: none; }
  .result.show { display: block; }
  .result audio { width: 100%; margin: 0.75rem 0; border-radius: var(--radius); }
  .meta { display: flex; flex-wrap: wrap; gap: 0.75rem; font-size: 0.85rem; color: var(--muted); }
  .meta span { background: var(--bg); padding: 0.3rem 0.6rem; border-radius: 6px; }
  .meta .cached { color: var(--success); }
  .captions-box {
    margin-top: 1rem; max-height: 200px; overflow-y: auto;
    background: var(--bg); border-radius: var(--radius); padding: 0.75rem;
    font-size: 0.85rem; line-height: 1.6;
  }
  .caption-line { padding: 0.15rem 0; }
  .caption-line .time { color: var(--accent); font-family: monospace; margin-right: 0.5rem; }
  .error-msg {
    display: none; background: #7f1d1d33; border: 1px solid var(--error);
    border-radius: var(--radius); padding: 0.75rem; color: var(--error);
    font-size: 0.9rem; margin-top: 0.75rem;
  }
  .error-msg.show { display: block; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid transparent; border-top-color: currentColor; border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 600px) {
    .controls, .controls.three { grid-template-columns: 1fr; }
    .btn-row { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>🔊 <span>xTTS</span></h1>
  <p class="subtitle">Text-to-Speech powered by edge-tts — Fast, free, 400+ voices</p>

  <div class="card">
    <label for="text">Nhập văn bản</label>
    <textarea id="text" placeholder="Xin chào anh em, đây là X Dev...">Xin chào anh em, đây là X Dev. Hôm nay mình sẽ nói về Kubernetes.</textarea>
    <div class="char-count"><span id="charCount">0</span> / 20000</div>

    <div class="controls">
      <div>
        <label for="lang">Ngôn ngữ</label>
        <select id="lang">
          <option value="vi" selected>🇻🇳 Tiếng Việt</option>
          <option value="en">🇺🇸 English</option>
          <option value="ja">🇯🇵 日本語</option>
          <option value="ko">🇰🇷 한국어</option>
          <option value="zh">🇨🇳 中文</option>
          <option value="fr">🇫🇷 Français</option>
          <option value="de">🇩🇪 Deutsch</option>
          <option value="es">🇪🇸 Español</option>
        </select>
      </div>
      <div>
        <label for="voice">Giọng đọc</label>
        <select id="voice"><option>Loading...</option></select>
      </div>
    </div>

    <div class="controls three">
      <div class="range-group">
        <div class="range-label"><span>Tốc độ</span><span id="rateVal">+0%</span></div>
        <input type="range" id="rate" min="-100" max="200" value="0">
      </div>
      <div class="range-group">
        <div class="range-label"><span>Âm lượng</span><span id="volumeVal">+0%</span></div>
        <input type="range" id="volume" min="-100" max="100" value="0">
      </div>
      <div class="range-group">
        <div class="range-label"><span>Pitch</span><span id="pitchVal">+0Hz</span></div>
        <input type="range" id="pitch" min="-100" max="100" value="0">
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-primary" id="btnGenerate" onclick="generate()">
        ▶ Tạo giọng nói
      </button>
      <button class="btn-secondary" id="btnDownload" onclick="download()" disabled>
        ⬇ Tải MP3
      </button>
    </div>

    <div class="error-msg" id="error"></div>
  </div>

  <div class="card result" id="result">
    <audio id="player" controls></audio>
    <div class="meta" id="meta"></div>
    <div class="captions-box" id="captions"></div>
  </div>
</div>

<script>
const API = window.location.origin;
let lastAudioBlob = null;

// ── Voice loading ──────────────────────────────────────────────────────────
const langSelect = document.getElementById('lang');
const voiceSelect = document.getElementById('voice');

async function loadVoices() {
  const lang = langSelect.value;
  voiceSelect.innerHTML = '<option>Loading...</option>';
  try {
    const res = await fetch(`${API}/voices?lang=${lang}`);
    const data = await res.json();
    voiceSelect.innerHTML = data.voices.map(v =>
      `<option value="${v.ShortName}">${v.ShortName} (${v.Gender})</option>`
    ).join('');
  } catch (e) {
    voiceSelect.innerHTML = '<option>Error loading voices</option>';
  }
}
langSelect.addEventListener('change', loadVoices);
loadVoices();

// ── Range sliders ──────────────────────────────────────────────────────────
function fmtPercent(v) { return (v >= 0 ? '+' : '') + v + '%'; }
function fmtHz(v) { return (v >= 0 ? '+' : '') + v + 'Hz'; }

const rateSlider = document.getElementById('rate');
const volumeSlider = document.getElementById('volume');
const pitchSlider = document.getElementById('pitch');

rateSlider.addEventListener('input', () => document.getElementById('rateVal').textContent = fmtPercent(rateSlider.value));
volumeSlider.addEventListener('input', () => document.getElementById('volumeVal').textContent = fmtPercent(volumeSlider.value));
pitchSlider.addEventListener('input', () => document.getElementById('pitchVal').textContent = fmtHz(pitchSlider.value));

// ── Char count ─────────────────────────────────────────────────────────────
const textArea = document.getElementById('text');
const charCount = document.getElementById('charCount');
textArea.addEventListener('input', () => charCount.textContent = textArea.value.length);
charCount.textContent = textArea.value.length;

// ── Generate ───────────────────────────────────────────────────────────────
async function generate() {
  const btn = document.getElementById('btnGenerate');
  const errEl = document.getElementById('error');
  const resultEl = document.getElementById('result');
  errEl.classList.remove('show');
  resultEl.classList.remove('show');

  const text = textArea.value.trim();
  if (!text) { showError('Vui lòng nhập văn bản'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Đang tạo...';

  try {
    const res = await fetch(`${API}/tts`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text,
        voice: voiceSelect.value,
        rate: fmtPercent(rateSlider.value),
        volume: fmtPercent(volumeSlider.value),
        pitch: fmtHz(pitchSlider.value),
      }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: res.statusText }));
      throw new Error(err.detail || err.error || 'Request failed');
    }

    const data = await res.json();

    // Audio
    const audioBytes = Uint8Array.from(atob(data.audio), c => c.charCodeAt(0));
    lastAudioBlob = new Blob([audioBytes], { type: 'audio/mpeg' });
    const url = URL.createObjectURL(lastAudioBlob);
    const player = document.getElementById('player');
    player.src = url;
    player.play();

    // Meta
    document.getElementById('meta').innerHTML = [
      `<span>⏱ ${data.durationSeconds}s</span>`,
      `<span>📦 ${(data.audioSize / 1024).toFixed(1)} KB</span>`,
      `<span>🧩 ${data.chunks} chunk(s)</span>`,
      `<span>⚡ ${data.elapsed}s</span>`,
      data.cached ? '<span class="cached">✓ Cache hit</span>' : '',
    ].join('');

    // Captions
    document.getElementById('captions').innerHTML = data.captions.map(c => {
      const start = (c.startFrame / 30).toFixed(1);
      const end = (c.endFrame / 30).toFixed(1);
      return `<div class="caption-line"><span class="time">${start}s–${end}s</span>${c.text}</div>`;
    }).join('');

    resultEl.classList.add('show');
    document.getElementById('btnDownload').disabled = false;

  } catch (e) {
    showError(e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '▶ Tạo giọng nói';
  }
}

function download() {
  if (!lastAudioBlob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(lastAudioBlob);
  a.download = 'xtts-speech.mp3';
  a.click();
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.classList.add('show');
}
</script>
</body>
</html>
